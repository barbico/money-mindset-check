<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Mindset Check — Finbrave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #2D4A3E;
    --linen: #F5F0E8;
    --blush: #C4957A;
    --forest-soft: #3d5f50;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--linen);
    color: var(--forest);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  h1, h2, .headline {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-weight: 600;
    color: var(--forest);
  }
  .card {
    background: #fff;
    border-radius: 20px;
    max-width: 640px;
    width: 100%;
    padding: 40px 36px;
    box-shadow: 0 10px 40px rgba(45,74,62,0.10);
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .headline { font-size: 32px; margin: 0 0 16px; }
  .subhead { font-size: 15px; margin: 0 0 24px; color: #55665d; line-height: 1.5; }
  .item {
    border: 1.5px solid #e3ddd0;
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 10px;
    cursor: pointer;
    font-size: 15.5px;
    line-height: 1.4;
    transition: all 0.15s ease;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .item:hover { border-color: var(--blush); }
  .item.selected {
    background: var(--forest);
    color: #fff;
    border-color: var(--forest);
  }
  .item .dot {
    width: 18px; height: 18px; min-width: 18px;
    border-radius: 50%;
    border: 2px solid #c8c0b0;
    margin-top: 2px;
  }
  .item.selected .dot { border-color: #fff; background: var(--blush); }
  .btn {
    background: var(--forest);
    color: #fff;
    border: none;
    padding: 14px 28px;
    border-radius: 30px;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
    margin-top: 20px;
    font-family: inherit;
    transition: background 0.15s ease;
  }
  .btn:hover { background: var(--forest-soft); }
  .btn.secondary {
    background: transparent;
    color: var(--forest);
    border: 1.5px solid var(--forest);
  }
  .progress {
    height: 4px;
    background: #e3ddd0;
    border-radius: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-fill { height: 100%; background: var(--blush); transition: width 0.3s ease; }
  .pattern-card {
    background: var(--linen);
    border-left: 4px solid var(--blush);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .pattern-card .name { font-weight: 700; font-size: 16px; margin-bottom: 6px; }
  .pattern-card .meaning { font-size: 14.5px; margin-bottom: 8px; line-height: 1.5; }
  .pattern-card .reframe { font-size: 14.5px; font-style: italic; color: #3d5f50; line-height: 1.5; }
  .note {
    background: #fbf7ee;
    border: 1px solid #ecdfc8;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.5;
    margin: 16px 0;
  }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 14px; margin-bottom: 6px; color: #55665d; }
  .field input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1.5px solid #e3ddd0;
    font-size: 16px;
    font-family: inherit;
  }
  .field input:focus { outline: none; border-color: var(--blush); }
  .field .suffix { font-size: 13px; color: #8a9089; }
  .calc-box {
    background: var(--forest);
    color: #fff;
    border-radius: 14px;
    padding: 20px;
    margin-top: 20px;
    text-align: center;
  }
  .calc-box .big { font-family: "Cormorant Garamond", serif; font-size: 36px; font-weight: 700; }
  .calc-box .label { font-size: 13px; opacity: 0.85; margin-bottom: 4px; }
  .disclaimer {
    font-size: 11.5px;
    color: #8a9089;
    line-height: 1.5;
    margin-top: 24px;
    border-top: 1px solid #eee;
    padding-top: 14px;
  }
  .summary-line { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14.5px; }
  .link { color: var(--blush); text-decoration: none; font-weight: 600; }
  .center { text-align: center; }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: #8a9089;
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 18px;
    background: none;
    border: none;
    padding: 0;
    font-family: inherit;
  }
  .back-link:hover { color: var(--forest); }
  .category-row-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .cat-label-input {
    flex: 1;
    border: none;
    border-bottom: 1.5px solid #e3ddd0;
    background: transparent;
    font-size: 14px;
    color: #55665d;
    padding: 4px 2px;
    font-family: inherit;
  }
  .cat-label-input:focus { outline: none; border-color: var(--blush); }
  .remove-btn {
    background: none;
    border: none;
    color: #b0a89a;
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    padding: 0 4px;
  }
  .remove-btn:hover { color: #b5453a; }
  .add-btn {
    background: transparent;
    border: 1.5px dashed #c8c0b0;
    color: #55665d;
    border-radius: 12px;
    padding: 10px;
    width: 100%;
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 16px;
    font-family: inherit;
  }
  .add-btn:hover { border-color: var(--blush); color: var(--forest); }
</style>
</head>
<body>

<div id="app" class="card"></div>

<script>
const patterns = [
  { name: "Identität", stmt: "Wenn ich an „reiche Menschen“ denke, kommt mir zuerst geizig oder gierig in den Sinn.", meaning: "Reiche Menschen werden unbewusst mit negativen Eigenschaften verknüpft — das kann davon abhalten, selbst wohlhabend werden zu wollen.", reframe: "Geld verstärkt, was da ist. Gerade gute Menschen können mit finanzieller Freiheit mehr bewirken." },
  { name: "Würdigkeit", stmt: "Bei einer Gehaltserhöhung oder einem Geldgeschenk denke ich zuerst: andere brauchen es mehr als ich.", meaning: "Der eigene Anspruch auf Geld wird klein gemacht, oft aus Fürsorge für andere.", reframe: "Finanzielle Sicherheit für dich selbst ist auch Verantwortung — z. B. für die, die dir wichtig sind." },
  { name: "Komplexität", stmt: "Finanzthemen wie Investieren fühlen sich an, als bräuchte ich dafür einen Experten-Abschluss.", meaning: "Finanzthemen wirken größer und komplizierter, als sie oft sind.", reframe: "Ein ETF-Sparplan einzurichten dauert in der Praxis oft nur wenige Minuten." },
  { name: "Zeit", stmt: "Ich denke manchmal: für mich ist es zu spät, um finanziell noch etwas zu verändern.", meaning: "Der Gedanke „zu spät“ verhindert oft den ersten Schritt, unabhängig vom tatsächlichen Alter.", reframe: "Rechenbeispiele zeigen: Auch später gestartete Sparbeträge über Jahre können sich spürbar aufbauen." },
  { name: "Scham", stmt: "Über Gehalt oder Kontostand zu sprechen, fühlt sich für mich unangenehm an.", meaning: "Geldgespräche gelten gesellschaftlich oft als Tabu — das hält viele in Unsicherheit allein.", reframe: "Offenheit über Geld hilft, voneinander zu lernen, statt allein zu rätseln." },
  { name: "Fatalismus", stmt: "Am Ende des Monats ist eh nie etwas übrig, egal was ich tue.", meaning: "Das Gefühl „es reicht eh nie“ kann verdecken, wohin das Geld tatsächlich fließt.", reframe: "Viele beginnen mit einer festen, automatischen Sparrate direkt nach Geldeingang." },
  { name: "Angst", stmt: "Investieren fühlt sich für mich an wie Zocken.", meaning: "Investieren und Spekulieren werden oft gedanklich gleichgesetzt — dabei unterscheiden sie sich stark.", reframe: "Breit gestreutes, langfristiges Anlegen ist historisch etwas anderes als kurzfristiges Zocken." },
  { name: "Perfektionismus", stmt: "Ich warte auf den perfekten Plan, bevor ich überhaupt anfange.", meaning: "Der Wunsch nach dem „perfekten“ Plan kann dazu führen, dass gar nichts passiert.", reframe: "Ein einfacher Plan, der heute startet, bringt oft mehr als ein perfekter Plan, der nie beginnt." },
  { name: "Kontrolle", stmt: "Ich will jederzeit an mein Geld rankommen — es irgendwo „wegzuschließen“ macht mir Unbehagen.", meaning: "Das Bedürfnis nach sofortigem Zugriff kann langfristiges Anlegen unbewusst blockieren.", reframe: "Ein Notgroschen für den Alltag und langfristig angelegtes Geld können nebeneinander bestehen." },
  { name: "Identifikation", stmt: "Mein Kontostand beeinflusst, wie ich über mich selbst denke.", meaning: "Der Kontostand wird zum Maßstab für den eigenen Wert — das ist eine sehr menschliche, aber trügerische Verknüpfung.", reframe: "Geld ist eine Ressource, kein Maßstab für den eigenen Wert als Mensch." },
  { name: "Sozialer Vergleich", stmt: "Ich vergleiche mich oft mit anderen und habe das Gefühl, ich müsste mehr haben.", meaning: "Was andere zu haben scheinen, ist selten das, was tatsächlich hinter den Kulissen los ist.", reframe: "Vermögen zeigt sich oft gerade nicht in dem, was sichtbar ist." },
  { name: "Passivität", stmt: "Um meine Finanzen kümmert sich eigentlich jemand anderes (Partner, Bank, Steuerberater).", meaning: "Wenn jemand anderes „sich kümmert“, fehlt oft der eigene Überblick — das kann später zum Risiko werden.", reframe: "Der eigene Überblick über die eigenen Finanzen ist ein Werkzeug für Unabhängigkeit — Schritt für Schritt aufbaubar." }
];

function defaultCategories() {
  return [
    { id: "c0", label: "Wohnen & Nebenkosten", amount: "" },
    { id: "c1", label: "Lebenshaltung & Essen", amount: "" },
    { id: "c2", label: "Mobilität", amount: "" },
    { id: "c3", label: "Versicherungen", amount: "" },
    { id: "c4", label: "Freizeit, Abos & Shopping", amount: "" },
    { id: "c5", label: "Sonstiges / „weiß ich gar nicht so genau“", amount: "" }
  ];
}

let state = {
  screen: 0,
  selected: new Set(),
  income: "",
  categories: defaultCategories(),
  nextCategoryId: 6
};

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  if (state.screen === 0) renderStart(app);
  else if (state.screen === 1) renderCheck(app);
  else if (state.screen === 2) renderPatternResult(app);
  else if (state.screen === 3) renderMoney(app);
  else if (state.screen === 4) renderMoneyResult(app);
  else if (state.screen === 5) renderSummary(app);
}

function renderStart(app) {
  app.innerHTML = `
    <div class="headline">Money Mindset Check</div>
    <div class="subhead">2 Minuten. Ehrlich zu dir selbst. Nichts wird gespeichert oder irgendwohin geschickt — das hier ist nur für dich.</div>
    <button class="btn" onclick="goTo(1)">Los geht's</button>
  `;
}

function backLink(targetScreen) {
  return `<button class="back-link" onclick="goTo(${targetScreen})">← Zurück</button>`;
}

function renderCheck(app) {
  const html = `
    ${backLink(0)}
    <div class="progress"><div class="progress-fill" style="width:100%"></div></div>
    <div class="headline" style="font-size:24px;">Was kennst du bei dir?</div>
    <div class="subhead">Tippe an, was du bei dir wiedererkennst. Es gibt kein richtig oder falsch — und niemand außer dir sieht das Ergebnis.</div>
    <div>
      ${patterns.map((p, i) => `
        <div class="item ${state.selected.has(i) ? 'selected' : ''}" onclick="toggle(${i})">
          <div class="dot"></div>
          <div>${p.stmt}</div>
        </div>
      `).join("")}
    </div>
    <button class="btn" onclick="goTo(2)">Weiter</button>
  `;
  app.innerHTML = html;
}

function toggle(i) {
  if (state.selected.has(i)) state.selected.delete(i);
  else state.selected.add(i);
  render();
}

function renderPatternResult(app) {
  const count = state.selected.size;
  let intro = "";
  if (count === 0) {
    intro = `<div class="note">Kein einziges Muster hat sich für dich gerade angefühlt wie du — das darf so sein. Schau gern in ein paar Wochen nochmal rein.</div>`;
  } else if (count <= 3) {
    intro = `<div class="note">Das sind die Muster, die du gerade bei dir erkennst. Interessant ist oft weniger die Anzahl — sondern welche es genau sind.</div>`;
  } else {
    intro = `<div class="note">Du hast gerade viel erkannt. Das ist mehr, als die meisten beim ersten Mal bei sich zulassen — das ist kein schlechtes Zeichen, sondern ehrliche Selbstwahrnehmung.</div>`;
  }
  const cards = [...state.selected].map(i => {
    const p = patterns[i];
    return `<div class="pattern-card">
      <div class="name">${p.name}</div>
      <div class="meaning">${p.meaning}</div>
      <div class="reframe">${p.reframe}</div>
    </div>`;
  }).join("");

  app.innerHTML = `
    ${backLink(1)}
    <div class="headline" style="font-size:26px;">Deine Muster gerade</div>
    ${intro}
    ${cards}
    <div class="note" style="background:#fff; border-color:#e3ddd0;">Du bist nicht schuld — dein Gehirn ist so gebaut, durch Prägung, Kultur und Evolution. Aber du kannst diese Muster verändern, sobald du sie siehst.</div>
    <button class="btn" onclick="goTo(3)">Weiter zu deinen Zahlen</button>
  `;
}

function renderMoney(app) {
  app.innerHTML = `
    ${backLink(2)}
    <div class="headline" style="font-size:24px;">Deine Zahlen</div>
    <div class="subhead">Nirgends zeigt sich Money Mindset deutlicher als in den eigenen Zahlen. Kurzer Check — grobe Schätzung reicht. Passe die Kategorien gern an deine Situation an.</div>
    <div class="field">
      <label>Monatliches Nettoeinkommen</label>
      <input type="number" min="0" placeholder="z.B. 2500" id="income-input" value="${state.income}" oninput="updateIncome(this.value)">
    </div>
    ${state.categories.map(c => `
      <div class="field category-row">
        <div class="category-row-top">
          <input type="text" class="cat-label-input" placeholder="Kategorie" value="${c.label}" oninput="updateCategoryLabel('${c.id}', this.value)">
          <button class="remove-btn" title="Kategorie entfernen" onclick="removeCategory('${c.id}')">×</button>
        </div>
        <input type="number" min="0" placeholder="0" id="expense-${c.id}" value="${c.amount}" oninput="updateCategoryAmount('${c.id}', this.value)">
      </div>
    `).join("")}
    <button class="add-btn" onclick="addCategory()">+ Kategorie hinzufügen</button>
    <div class="calc-box">
      <div class="label">Rest am Monatsende</div>
      <div class="big" id="rest-display">${calcRest()} €</div>
    </div>
    <button class="btn" onclick="goTo(4)">Zeig mir mein Ergebnis</button>
  `;
}

function updateIncome(v) {
  state.income = v;
  const el = document.getElementById("rest-display");
  if (el) el.textContent = calcRest() + " €";
}
function updateCategoryAmount(id, v) {
  const cat = state.categories.find(c => c.id === id);
  if (cat) cat.amount = v;
  const el = document.getElementById("rest-display");
  if (el) el.textContent = calcRest() + " €";
}
function updateCategoryLabel(id, v) {
  const cat = state.categories.find(c => c.id === id);
  if (cat) cat.label = v;
}
function addCategory() {
  state.categories.push({ id: "c" + state.nextCategoryId, label: "", amount: "" });
  state.nextCategoryId++;
  render();
}
function removeCategory(id) {
  state.categories = state.categories.filter(c => c.id !== id);
  render();
}

function sumExpenses() {
  return state.categories.reduce((sum, c) => sum + (parseFloat(c.amount) || 0), 0);
}
function calcRest() {
  const income = parseFloat(state.income) || 0;
  return Math.round(income - sumExpenses());
}

function renderMoneyResult(app) {
  const income = parseFloat(state.income) || 0;
  const rest = calcRest();
  const sonstigesCat = state.categories.find(c => c.label.toLowerCase().includes("sonstig"));
  const sonstiges = sonstigesCat ? (parseFloat(sonstigesCat.amount) || 0) : 0;
  const sonstigesPct = income > 0 ? (sonstiges / income) * 100 : 0;
  const restPct = income > 0 ? (rest / income) * 100 : 0;

  let hint = "";
  if (sonstigesCat && sonstigesPct >= 10) {
    hint = `Auffällig: „${sonstigesCat.label}“ macht bei dir ${Math.round(sonstigesPct)}% deiner Ausgaben aus. Genau hier versteckt sich bei vielen das größte Sparpotenzial — nicht weil schlecht gewirtschaftet wird, sondern weil dieser Posten selten bewusst wahrgenommen wird.`;
  } else if (rest < 0) {
    hint = `Bei dir bleibt rechnerisch gerade nichts übrig oder es fehlt sogar etwas. Das ist eine Zahl, kein Urteil — sie zeigt nur, wo ein genauerer Blick sich lohnen könnte.`;
  } else if (restPct >= 10) {
    hint = `Am Monatsende bleibt dir rechnerisch ein spürbarer Betrag. Die Frage, die sich viele hier stellen: Wohin geht dieser Betrag aktuell — und wohin könnte er gehen?`;
  } else {
    hint = `Deine Zahlen sind gerade recht ausgeglichen. Ein Blick in ein paar Monaten kann zeigen, ob sich das über die Zeit verändert.`;
  }

  let bridge = "";
  if (state.selected.size > 0) {
    const firstPattern = patterns[[...state.selected][0]];
    bridge = `<div class="note">Erinnerst du dich an <strong>${firstPattern.name}</strong> von eben? Schau nochmal auf deine Zahlen oben — zeigt sich das Muster hier vielleicht auch?</div>`;
  }

  app.innerHTML = `
    ${backLink(3)}
    <div class="headline" style="font-size:26px;">Deine Zahlen im Blick</div>
    <div class="calc-box">
      <div class="label">Rest am Monatsende</div>
      <div class="big">${rest} €</div>
    </div>
    <div class="note">${hint}</div>
    ${bridge}
    <button class="btn" onclick="goTo(5)">Weiter</button>
  `;
}

function renderSummary(app) {
  const rest = calcRest();
  const patternNames = [...state.selected].map(i => patterns[i].name).join(", ") || "Keine erkannten Muster";
  app.innerHTML = `
    ${backLink(4)}
    <div class="headline" style="font-size:26px;">Das nimmst du mit</div>
    <div class="summary-line"><span>Erkannte Muster</span><span>${patternNames}</span></div>
    <div class="summary-line"><span>Rest am Monatsende</span><span>${rest} €</span></div>
    <div class="note">Das hier ist eine Momentaufnahme, kein Urteil über dich. Wenn du tiefer einsteigen möchtest — Reframes, kleine Schritte, echtes Verändern deiner Muster — das gibt es im Coaching-Modul in der Finbrave App.</div>
    <div class="center">
      <a class="link" href="https://finbrave.com" target="_blank">Mehr auf finbrave.com →</a>
    </div>
    <div class="disclaimer">Diese Übung dient der Selbstreflexion und ersetzt keine individuelle Finanz-, Anlage- oder Versicherungsberatung. Keine Rendite- oder Ergebnisgarantie.</div>
    <button class="btn secondary" onclick="reset()">Nochmal von vorn</button>
  `;
}

function goTo(screen) { state.screen = screen; render(); }
function reset() {
  state = { screen: 0, selected: new Set(), income: "", categories: defaultCategories(), nextCategoryId: 6 };
  render();
}

render();
</script>
</body>
</html>
